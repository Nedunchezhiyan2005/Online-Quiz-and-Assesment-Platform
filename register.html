<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | QuizFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .register-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 40px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 4px;
            display: none;
        }
        .input-group.error .input-field {
            border-color: #ef4444;
        }
        .input-group.error .error-msg {
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="Home.html" style="font-weight: 700; color: var(--primary); text-decoration: none;">QuizFlow</a>
        <a href="login.html" class="btn btn-primary">Sign In</a>
    </nav>

    <div class="register-container glass-card animate-fade">
        <h2 style="margin-bottom: 30px; text-align: center;">Create Account</h2>
        
        <form id="registerForm" novalidate>
            <div class="form-grid">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" class="input-field" placeholder="John Doe">
                    <span class="error-msg">Name is required</span>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" class="input-field" placeholder="john@example.com">
                    <span class="error-msg">Invalid email address</span>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="reg-phone" class="input-field" placeholder="+1 (555) 000-0000">
                    <span class="error-msg">Phone number is required</span>
                </div>
                <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date" id="reg-dob" class="input-field">
                    <span class="error-msg">Select your birth date</span>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-pass" class="input-field" placeholder="••••••••">
                    <span class="error-msg">Password must be at least 8 characters</span>
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <select id="reg-gender" class="input-field" style="height: 48px;">
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                    <span class="error-msg">Select a gender</span>
                </div>
            </div>
            
            <div class="input-group" style="margin-top: 20px;">
                <label>Address</label>
                <textarea id="reg-address" class="input-field" rows="3" placeholder="Your full address"></textarea>
                <span class="error-msg">Address is required</span>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 30px;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Register Now</button>
                <button type="reset" class="btn" style="flex: 1; border: 1px solid var(--card-border); background: var(--bg-main); color: var(--text-primary);">Reset</button>
            </div>
        </form>
        
        <p style="text-align: center; margin-top: 20px; color: var(--text-secondary); font-size: 0.9rem;">
            Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
